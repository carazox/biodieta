<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#10b981">
<title>Lista de la compra · Biodieta</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --panel-2: #f0f2f5;
    --text: #1c1f23;
    --text-soft: #6b7280;
    --border: #e5e7eb;
    --accent: #10b981;
    --accent-soft: #d1fae5;
    --danger: #ef4444;
    --warn: #f59e0b;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --panel: #181b21;
      --panel-2: #21252c;
      --text: #e6e8eb;
      --text-soft: #9aa0a6;
      --border: #2a2f37;
      --accent: #10b981;
      --accent-soft: #064e3b;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    font-size: 16px; line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 920px; margin: 0 auto; padding: 16px; padding-bottom: 96px; }

  /* === HEADER STICKY === */
  header.app {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: color-mix(in srgb, var(--bg) 85%, transparent);
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; max-width: 920px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  h1 .sub { color: var(--text-soft); font-weight: 400; font-size: 14px; margin-left: 4px; }

  .resumen { display: flex; gap: 12px; align-items: center; max-width: 920px; margin: 8px auto 0; flex-wrap: wrap; }
  .badge { padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 500;
    background: var(--panel-2); color: var(--text-soft); white-space: nowrap; }
  .badge.ok { background: var(--accent-soft); color: var(--accent); }
  .badge.pend { background: rgba(245, 158, 11, .15); color: var(--warn); }
  .progreso { flex: 1; min-width: 120px; height: 6px; border-radius: 999px; background: var(--panel-2); overflow: hidden; }
  .progreso > div { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }

  /* === FILTROS === */
  .filtros { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin: 16px 0; box-shadow: var(--shadow); }
  .filtros[disabled] { opacity: .55; pointer-events: none; }
  .filtros[disabled]::after {
    content: "🔒 Filtros bloqueados";
    position: absolute; right: 28px; padding: 4px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-size: 12px; font-weight: 600;
    pointer-events: none; transform: translateY(-8px);
  }
  .filtros { position: relative; }
  .grupo { margin-bottom: 14px; }
  .grupo:last-child { margin-bottom: 0; }
  .grupo-label { font-size: 13px; font-weight: 600; color: var(--text-soft); text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .grupo-acciones { display: flex; gap: 6px; }
  .mini { font-size: 12px; padding: 2px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-soft); cursor: pointer; }
  .mini:hover { background: var(--panel-2); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 7px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); font-size: 14px; cursor: pointer; transition: all .15s; user-select: none;
    min-height: 36px; display: inline-flex; align-items: center;
  }
  .chip:hover { background: var(--panel-2); }
  .chip.activo { background: var(--accent); color: white; border-color: var(--accent); }
  .chip.activo:hover { background: var(--accent); filter: brightness(1.05); }

  .switch { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .switch input { position: absolute; opacity: 0; pointer-events: none; }
  .switch-pista { width: 44px; height: 26px; border-radius: 999px; background: var(--panel-2); position: relative;
    border: 1px solid var(--border); transition: all .2s; flex-shrink: 0; }
  .switch-pista::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
    border-radius: 50%; background: white; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: all .2s; }
  .switch input:checked + .switch-pista { background: var(--accent); border-color: var(--accent); }
  .switch input:checked + .switch-pista::after { transform: translateX(18px); }

  /* === LISTA === */
  .seccion { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .seccion-titulo { display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); font-weight: 600; font-size: 16px; background: var(--panel-2); }
  .seccion-titulo .contador { margin-left: auto; font-size: 13px; color: var(--text-soft); font-weight: 500; }
  .seccion-titulo .emoji { font-size: 22px; }
  ul.items { list-style: none; margin: 0; padding: 0; }
  ul.items li { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border);
    gap: 12px; transition: background .15s; }
  ul.items li:last-child { border-bottom: none; }
  ul.items li:hover { background: var(--panel-2); }
  .item-info { flex: 1; min-width: 0; }
  .item-nombre { font-size: 15px; font-weight: 500; }
  .item-cantidad { font-size: 13px; color: var(--text-soft); margin-top: 2px; }
  li.comprado .item-info { text-decoration: line-through; color: var(--text-soft); opacity: .55; }
  .btn-cart { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--panel); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; flex-shrink: 0; }
  .btn-cart:hover { background: var(--panel-2); }
  .btn-cart.marcado { background: var(--accent); border-color: var(--accent); color: white; }

  .vacio { text-align: center; padding: 60px 20px; color: var(--text-soft); }
  .vacio .emoji { font-size: 64px; margin-bottom: 12px; }

  /* === FAB CANDADO === */
  .fab-grupo { position: fixed; bottom: 24px; right: 24px; z-index: 60; display: flex; flex-direction: column; gap: 10px; }
  .fab { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--panel); color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.2);
    font-size: 22px; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .fab:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.25); }
  .fab.bloqueado { background: var(--accent); color: white; }
  .fab.reset { width: 44px; height: 44px; font-size: 16px; opacity: .8; }
  @media (max-width: 480px) {
    .fab { width: 52px; height: 52px; font-size: 20px; }
    .fab-grupo { bottom: 16px; right: 16px; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    h1 { font-size: 16px; }
    h1 .sub { display: none; }
    .filtros { padding: 14px; }
    .seccion-titulo { padding: 12px 14px; }
    ul.items li { padding: 10px 14px; }
  }
</style>
</head>
<body>
  <header class="app">
    <div class="header-row">
      <h1>🛒 Lista de la compra <span class="sub">· Biodieta</span></h1>
      <div style="font-size: 13px; color: var(--text-soft);" id="meta-info"></div>
    </div>
    <div class="resumen">
      <span class="badge">Total: <strong id="total">0</strong></span>

      <span class="badge pend">Pendientes: <strong id="pendientes">0</strong></span>
      <div class="progreso"><div id="barra" style="width: 0%"></div></div>
    </div>
  </header>

  <div class="container">
    <section class="filtros" id="filtros">
      <div class="grupo">
        <div class="grupo-label">
          Días de la semana
          <div class="grupo-acciones">
            <button class="mini" data-action="all-dias">Todos</button>
            <button class="mini" data-action="none-dias">Ninguno</button>
          </div>
        </div>
        <div class="chips" id="chips-dias"></div>
      </div>
      <div class="grupo">
        <div class="grupo-label">
          Tomas
          <div class="grupo-acciones">
            <button class="mini" data-action="all-tomas">Todas</button>
            <button class="mini" data-action="none-tomas">Ninguna</button>
          </div>
        </div>
        <div class="chips" id="chips-tomas"></div>
      </div>
      <div class="grupo" style="display: flex; align-items: center; justify-content: space-between;">
        <div class="grupo-label" style="margin: 0;">Vista</div>
        <label class="switch">
          <span style="font-size: 14px;">Agrupar por sección del súper</span>
          <input type="checkbox" id="agrupar" checked>
          <span class="switch-pista"></span>
        </label>
      </div>
    </section>

    <section id="lista"></section>
  </div>

  <div class="fab-grupo">
    <button class="fab reset" id="reset" title="Limpiar marcas de comprado">🔄</button>
    <button class="fab" id="lock" title="Bloquear filtros">🔓</button>
  </div>

  {id: "jueves", nom: "Jue"}, {id: "viernes", nom: "Vie"}, {id: "sabado", nom: "Sáb"}, {id: "domingo", nom: "Dom"}
];
const TOMAS = [
  {id: "desayuno", nom: "Desayuno"},
  {id: "pre_mediamañana", nom: "Pre-mediamañana"},
  {id: "mediamañana", nom: "Mediamañana"},
  {id: "almuerzo", nom: "Almuerzo"},
  {id: "pre_merienda", nom: "Pre-merienda"},
  {id: "merienda", nom: "Merienda"},
  {id: "cena", nom: "Cena"}
];
const EMOJIS_SECCION = {
  fruteria: "🥦", carniceria: "🥩", pescaderia: "🐟",
  charcuteria: "🍖", panaderia: "🍞", lacteos: "🥛",
  hueveria: "🥚", despensa: "🥫", aceites_y_vinagres: "🫒", bebidas: "🧃"
};

const REV = String(DB.meta.revision_actual);

// === ESTADO ===
const state = (() => {
  const def = {
    dias: DIAS.map(d => d.id),
    tomas: TOMAS.map(t => t.id),
    agrupar: true,
    bloqueado: false,
    comprados: []
  };
  try {
    const raw = localStorage.getItem("biodieta_compra_state_v1");
    if (raw) return { ...def, ...JSON.parse(raw) };
  } catch(e) {}
  return def;
})();
function guardarEstado() {
  try { localStorage.setItem("biodieta_compra_state_v1", JSON.stringify(state)); } catch(e) {}
}

// === DATOS: expandir items ===
function expandirItem(it) {
  if (!it || typeof it !== "object") return [];
  if (it.tipo === "receta") {
    const r = DB.recetas[it.receta_id];
    if (!r) return [];
    const rac = it.raciones || 1;
    return r.ingredientes.map(g => ({
      alimento: g.alimento,
      cantidad: (g.cantidad == null ? null : g.cantidad * rac),
      unidad: g.unidad,
      notas: g.notas
    }));
  }
  if (it.alimento) {
    return [{ alimento: it.alimento, cantidad: it.cantidad, unidad: it.unidad, notas: it.notas }];
  }
  return [];
}
function itemsDelDia(dia, tomasSet) {
  const out = [];
  for (const t of TOMAS) {
    if (!tomasSet.has(t.id)) continue;
    const arr = (DB.tomas_fijas[t.id] && DB.tomas_fijas[t.id][dia]) || (DB.revisiones[REV][t.id] && DB.revisiones[REV][t.id][dia]) || [];
    out.push(...arr);
  }
  return out;
}

function calcularLista() {
  const diasSet = new Set(state.dias);
  const tomasSet = new Set(state.tomas);
  // alimento|unidad -> { total, sinCant, notas:Set }
  const agreg = new Map();
  for (const d of DIAS) {
    if (!diasSet.has(d.id)) continue;
    for (const it of itemsDelDia(d.id, tomasSet)) {
      for (const e of expandirItem(it)) {
        const key = e.alimento + "|" + (e.unidad || "");
        let entry = agreg.get(key);
        if (!entry) {
          entry = { alimento: e.alimento, unidad: e.unidad, total: 0, sinCant: 0, notas: new Set() };
          agreg.set(key, entry);
        }
        if (e.cantidad == null) entry.sinCant++;
        else entry.total += e.cantidad;
        if (e.notas) entry.notas.add(e.notas);
      }
    }
  }
  return Array.from(agreg.values());
}

function fmtCantidad(entry) {
  const partes = [];
  if (entry.total > 0) {
    const n = Number(entry.total.toFixed(2));
    partes.push(`${n} ${entry.unidad || ""}`.trim());
  }
  if (entry.sinCant > 0) partes.push(entry.sinCant === 1 ? "al gusto" : `${entry.sinCant}× al gusto`);
  return partes.join(" + ") || "—";
}

// === RENDER ===
function renderChips() {
  const elDias = document.getElementById("chips-dias");
  elDias.innerHTML = "";
  const setDias = new Set(state.dias);
  for (const d of DIAS) {
    const b = document.createElement("button");
    b.className = "chip" + (setDias.has(d.id) ? " activo" : "");
    b.textContent = d.nom;
    b.onclick = () => {
      if (state.bloqueado) return;
      if (setDias.has(d.id)) state.dias = state.dias.filter(x => x !== d.id);
      else state.dias = [...state.dias, d.id];
      guardarEstado(); render();
    };
    elDias.appendChild(b);
  }
  const elTomas = document.getElementById("chips-tomas");
  elTomas.innerHTML = "";
  const setTomas = new Set(state.tomas);
  for (const t of TOMAS) {
    const b = document.createElement("button");
    b.className = "chip" + (setTomas.has(t.id) ? " activo" : "");
    b.textContent = t.nom;
    b.onclick = () => {
      if (state.bloqueado) return;
      if (setTomas.has(t.id)) state.tomas = state.tomas.filter(x => x !== t.id);
      else state.tomas = [...state.tomas, t.id];
      guardarEstado(); render();
    };
    elTomas.appendChild(b);
  }
}

function renderLista() {
  const cont = document.getElementById("lista");
  cont.innerHTML = "";
  const items = calcularLista();
  if (!items.length) {
    cont.innerHTML = '<div class="vacio"><div class="emoji">🥗</div><div>No hay productos con los filtros seleccionados</div></div>';
    actualizarResumen(0, 0);
    return;
  }

  const compradosSet = new Set(state.comprados);
  const totalProductos = items.length;
  let comprados = 0;

  if (state.agrupar) {
    const porSec = new Map();
    for (const it of items) {
      const sec = DB.alimentos[it.alimento].seccion;
      if (!porSec.has(sec)) porSec.set(sec, []);
      porSec.get(sec).push(it);
    }
    const secOrden = Array.from(porSec.keys()).sort((a, b) => DB.secciones_super[a].orden - DB.secciones_super[b].orden);
    for (const secId of secOrden) {
      const its = porSec.get(secId).sort((a, b) => DB.alimentos[a.alimento].nombre.localeCompare(DB.alimentos[b.alimento].nombre, "es"));
      const secEl = document.createElement("div");
      secEl.className = "seccion";
      const tit = document.createElement("div");
      tit.className = "seccion-titulo";
      tit.innerHTML = `<span class="emoji">${EMOJIS_SECCION[secId] || "🛒"}</span><span>${DB.secciones_super[secId].nombre}</span><span class="contador" data-sec="${secId}"></span>`;
      secEl.appendChild(tit);
      const ul = document.createElement("ul"); ul.className = "items";
      let comprSec = 0;
      for (const it of its) {
        const li = renderItem(it, compradosSet);
        if (compradosSet.has(itemKey(it))) { comprados++; comprSec++; }
        ul.appendChild(li);
      }
      tit.querySelector('.contador').textContent = `${comprSec} / ${its.length}`;
      secEl.appendChild(ul);
      cont.appendChild(secEl);
    }
  } else {
    items.sort((a, b) => DB.alimentos[a.alimento].nombre.localeCompare(DB.alimentos[b.alimento].nombre, "es"));
    const sec = document.createElement("div"); sec.className = "seccion";
    const ul = document.createElement("ul"); ul.className = "items";
    for (const it of items) {
      const li = renderItem(it, compradosSet);
      if (compradosSet.has(itemKey(it))) comprados++;
      ul.appendChild(li);
    }
    sec.appendChild(ul); cont.appendChild(sec);
  }
  actualizarResumen(totalProductos, comprados);
}

function itemKey(it) { return it.alimento + "|" + (it.unidad || ""); }

function renderItem(it, compradosSet) {
  const li = document.createElement("li");
  const key = itemKey(it);
  const comprado = compradosSet.has(key);
  if (comprado) li.classList.add("comprado");
  const info = document.createElement("div"); info.className = "item-info";
  const nom = document.createElement("div"); nom.className = "item-nombre";
  nom.textContent = DB.alimentos[it.alimento].nombre;
  const cant = document.createElement("div"); cant.className = "item-cantidad";
  cant.textContent = fmtCantidad(it);
  if (it.notas && it.notas.size) cant.textContent += " · " + Array.from(it.notas).join("; ");
  info.appendChild(nom); info.appendChild(cant);
  const btn = document.createElement("button");
  btn.className = "btn-cart" + (comprado ? " marcado" : "");
  btn.innerHTML = comprado ? "✓" : "🛒";
  btn.title = comprado ? "Marcar como pendiente" : "Marcar como comprado";
  btn.onclick = () => {
    if (compradosSet.has(key)) state.comprados = state.comprados.filter(k => k !== key);
    else state.comprados = [...state.comprados, key];
    guardarEstado(); render();
  };
  li.appendChild(info); li.appendChild(btn);
  return li;
}

function actualizarResumen(total, comprados) {
  document.getElementById("total").textContent = total;
  document.getElementById("comprados").textContent = comprados;
  document.getElementById("pendientes").textContent = total - comprados;
  const pct = total > 0 ? (comprados / total * 100) : 0;
  document.getElementById("barra").style.width = pct + "%";
}

function render() {
  document.getElementById("filtros").toggleAttribute("disabled", state.bloqueado);
  const lock = document.getElementById("lock");
  lock.textContent = state.bloqueado ? "🔒" : "🔓";
  lock.classList.toggle("bloqueado", state.bloqueado);
  lock.title = state.bloqueado ? "Desbloquear filtros" : "Bloquear filtros";
  document.getElementById("agrupar").checked = state.agrupar;
  renderChips();
  renderLista();
}

// === EVENTOS ===
document.getElementById("agrupar").onchange = (e) => {
  if (state.bloqueado) { e.target.checked = state.agrupar; return; }
  state.agrupar = e.target.checked; guardarEstado(); render();
};
document.getElementById("lock").onclick = () => {
  state.bloqueado = !state.bloqueado; guardarEstado(); render();
};
document.getElementById("reset").onclick = () => {
  if (state.comprados.length === 0) return;
  if (confirm("¿Limpiar todas las marcas de comprado?")) {
    state.comprados = []; guardarEstado(); render();
  }
};
document.querySelectorAll("[data-action]").forEach(b => {
  b.onclick = () => {
    if (state.bloqueado) return;
    const a = b.dataset.action;
    if (a === "all-dias") state.dias = DIAS.map(d => d.id);
    else if (a === "none-dias") state.dias = [];
    else if (a === "all-tomas") state.tomas = TOMAS.map(t => t.id);
    else if (a === "none-tomas") state.tomas = [];
    guardarEstado(); render();
  };
});

document.getElementById("meta-info").textContent = "Rev. " + DB.meta.revision_actual + " · " + DB.meta.fecha_revision;
render();
</script>
</body>
</html>
